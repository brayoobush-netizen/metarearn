<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Earn Tasks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body[data-theme="light"] { background: #f9f9f9; color: #333; }
    body[data-theme="dark"] { background: #121212; color: #eee; }
    .navbar { background: linear-gradient(90deg, #0f9d58, #34a853); }
    .task-card { border-radius: 12px; padding: 20px; margin: 15px; transition: transform 0.3s; }
    .task-card:hover { transform: scale(1.05); }
    .btn-task { background-color: #25d366; font-weight: bold; border-radius: 8px; }
    .menu-dots { cursor: pointer; font-size: 24px; }
    .dropdown-menu { background-color: #128c7e; }
    .dropdown-item { color: #fff; }
    .dropdown-item:hover { background-color: #25d366; color: #000; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg px-3">
    <a class="navbar-brand text-white" href="#">💸 MoneyViews</a>
    <div class="ms-auto">
      <span class="menu-dots" id="menuDots">⋮</span>
      <ul class="dropdown-menu dropdown-menu-end" id="menuDropdown">
        <li><a class="dropdown-item" href="{{ url_for('dashboard') }}">Dashboard</a></li>
        <li><a class="dropdown-item" href="{{ url_for('profile') }}">Profile</a></li>
        <li><a class="dropdown-item" href="{{ url_for('wallet') }}">Wallet</a></li>
        <li><a class="dropdown-item" href="{{ url_for('settings') }}">Settings</a></li>
      </ul>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="mb-4">Available Tasks</h2>
    <!-- Example task cards -->
    <div class="task-card bg-success text-white">
      <h4>Watch Ad</h4>
      <p>Earn virtual cash by watching a short advert.</p>
      <button class="btn btn-task">Do Task</button>
    </div>
    <div class="task-card bg-info text-dark">
      <h4>Subscribe to YouTube Channel</h4>
      <p>Support creators and earn rewards.</p>
      <button class="btn btn-task">Do Task</button>
    </div>
    <div class="task-card bg-warning text-dark">
      <h4>Refer a Friend</h4>
      <p>Invite friends and earn referral bonuses.</p>
      <button class="btn btn-task">Do Task</button>
    </div>
  </div>

  <script>
    // Toggle dropdown menu
    document.getElementById("menuDots").onclick = function() {
      document.getElementById("menuDropdown").classList.toggle("show");
    };

    // Theme toggle (light/dark)
    document.addEventListener("keydown", function(e) {
      if (e.key === "t") {
        let body = document.querySelector("body");
        body.dataset.theme = body.dataset.theme === "light" ? "dark" : "light";
      }
    });
  </script>
</body>
</html>
