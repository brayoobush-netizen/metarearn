<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MetaEarn 🚀</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url("/static/images/login-bg.jpg") no-repeat center center fixed;
      background-size: cover;
    }
    .container {
      max-width: 400px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .brand {
      text-align: center;
      margin-bottom: 20px;
    }
    .brand h1 {
      font-size: 28px;
      margin: 0;
      color: #007bff;
    }
    .brand .rocket {
      font-size: 40px;
    }
    h2 {
      text-align: center;
      margin-bottom: 15px;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .register-section {
      margin-top: 20px;
      text-align: center;
    }
    .register-section a {
      color: #007bff;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ✅ MetaEarn branding with rocket -->
    <div class="brand">
      <h1>MetaEarn <span class="rocket">🚀</span></h1>
      <p>Welcome back, let’s launch!</p>
    </div>

    <h2>Log In</h2>
    <form method="POST" action="{{ url_for('login') }}">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Log In</button>
    </form>

    <!-- ✅ Register section below login -->
    <div class="register-section">
      <p>Don’t have an account yet?</p>
      <a href="{{ url_for('register') }}">Create one here</a>
    </div>
  </div>
</body>
</html>
