<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Wallet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(to bottom, #0f9d58, #34a853); color: #fff; }
    .navbar { background-color: #075e54; }
    .nav-link { color: #fff !important; font-weight: bold; }
    .card { background-color: #128c7e; border-radius: 12px; padding: 20px; }
    .btn-custom { background-color: #25d366; color: #000; font-weight: bold; border-radius: 8px; margin: 5px; }
    input[type="number"] { border-radius: 6px; padding: 5px; margin: 5px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand text-white" href="#">💸 MoneyViews</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('profile') }}">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="card text-center">
      <h2>Wallet Balance</h2>
      <h3 style="color:#25d366;">{{ user.wallet_balance or 0 }} KES</h3>

      <!-- Deposit Form -->
      <form action="{{ url_for('deposit') }}" method="POST" class="d-inline">
        <input type="number" name="amount" placeholder="Amount" min="1" required>
        <button type="submit" class="btn btn-custom">Deposit</button>
      </form>

      <!-- Withdraw Form -->
      <form action="{{ url_for('withdraw') }}" method="POST" class="d-inline">
        <input type="number" name="amount" placeholder="Amount" min="1" required>
        <button type="submit" class="btn btn-custom">Withdraw</button>
      </form>
    </div>
  </div>
</body>
</html>
