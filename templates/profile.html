<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(to bottom, #0f9d58, #34a853); color: #fff; }
    .navbar { background-color: #075e54; }
    .nav-link { color: #fff !important; font-weight: bold; }
    .card { background-color: #128c7e; border-radius: 12px; padding: 20px; }
    .btn-custom { background-color: #25d366; color: #000; font-weight: bold; border-radius: 8px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand text-white" href="#">💸 MoneyViews</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('wallet') }}">Wallet</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="card text-center">
      <img src="/static/images/user.png" alt="User" class="img-fluid rounded-circle mb-3" style="width:120px;">
      <h3>{{ user.email }}</h3>
      <p>User ID: {{ user.id }}</p>
      <a href="#" class="btn btn-custom">Edit Profile</a>
    </div>
  </div>
</body>
</html>
