<!-- templates/register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MetaEarn | Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #ff6ec4, #7873f5, #34a853);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }
    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }
    .card {
      background-color: rgba(0,0,0,0.6);
      border-radius: 15px;
      padding: 30px;
      margin-top: 60px;
      color: #fff;
    }
    .btn-glow {
      background: linear-gradient(90deg, #34a853, #25d366);
      border: none;
      border-radius: 30px;
      padding: 12px;
      font-size: 1.2rem;
      color: #fff;
      box-shadow: 0 0 20px rgba(0,255,100,0.7);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .btn-glow:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(0,255,100,1);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card animate__animated animate__fadeInUp">
          <h2 class="text-center mb-4">🚀 Register for MetaEarn</h2>
          <form method="POST" action="/register" onsubmit="launchConfetti()">
            <div class="mb-3">
              <label>Email</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label>Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn-glow w-100">Create Account</button>
          </form>
          {% with messages = get_flashed_messages() %}
            {% if messages %}
              <div class="alert alert-warning mt-3 animate__animated animate__shakeX">
                {{ messages[0] }}
              </div>
            {% endif %}
          {% endwith %}
        </div>
      </div>
    </div>
  </div>

  <script>
    function launchConfetti() {
      confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 }
      });
    }
  </script>
</body>
</html>
