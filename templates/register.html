<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - MetaEarn 🚀</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url("{{ url_for('static', filename='images/register-bg.jpg') }}") 
                  no-repeat center center fixed;
      background-size: cover;
    }
    .container {
      max-width: 400px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .brand {
      text-align: center;
      margin-bottom: 20px;
    }
    .brand h1 {
      font-size: 28px;
      margin: 0;
      color: #007bff;
    }
    .brand .rocket {
      font-size: 40px;
    }
    h2 {
      text-align: center;
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .login-section {
      margin-top: 20px;
      text-align: center;
    }
    .login-section a {
      color: #007bff;
      text-decoration: none;
      font-weight: bold;
    }
    /* Mobile tweaks */
    @media (max-width: 480px) {
      .container {
        margin: 20px;
        padding: 15px;
      }
      .brand h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- ✅ MetaEarn branding with rocket -->
    <div class="brand">
      <h1>MetaEarn <span class="rocket">🚀</span></h1>
      <p>Earn smarter, faster, higher!</p>
    </div>

    <h2>Create Account</h2>
    <form method="POST" action="{{ url_for('register') }}">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Email" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Password" required>

      <button type="submit">Register</button>
    </form>

    <!-- ✅ Login section below registration -->
    <div class="login-section">
      <p>Already have an account?</p>
      <a href="{{ url_for('login') }}">Log in here</a>
    </div>
  </div>
</body>
</html>
