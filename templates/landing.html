<!-- templates/landing.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MetaEarn | Welcome</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff6ec4, #7873f5, #34a853, #fbbc05, #ea4335);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }
    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }
    .brand {
      text-align: center;
      animation: fadeInDown 2s;
    }
    .brand h1 {
      font-size: 4rem;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
    }
    .brand h1 span {
      color: #ffd700;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% {text-shadow: 0 0 10px #ffd700;}
      50% {text-shadow: 0 0 30px #ffd700;}
      100% {text-shadow: 0 0 10px #ffd700;}
    }
    .btn-glow {
      margin: 15px;
      padding: 15px 40px;
      font-size: 1.2rem;
      border-radius: 30px;
      border: none;
      color: #fff;
      background: linear-gradient(90deg, #34a853, #25d366);
      box-shadow: 0 0 20px rgba(0,255,100,0.7);
      transition: transform 0.3s, box-shadow 0.3s;
      text-decoration: none; /* ✅ ensures link looks like button */
      display: inline-block;
    }
    .btn-glow:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px rgba(0,255,100,1);
    }
  </style>
</head>
<body>
  <div class="brand animate__animated animate__fadeInUp">
    <h1>🌌 Welcome to <span>MetaEarn</span></h1>
    <p class="lead">Empowering your wallet, one click at a time.</p>
    <div>
      <!-- ✅ Buttons now link to Flask routes -->
      <a href="{{ url_for('register') }}" class="btn-glow">🚀 Register</a>
      <a href="{{ url_for('login') }}" class="btn-glow" style="background:linear-gradient(90deg,#4285f4,#34a853);box-shadow:0 0 20px rgba(66,133,244,0.7);">🔑 Login</a>
    </div>
  </div>
</body>
</html>
